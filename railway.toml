# =========================================================
# Railway 部署配置
# 文档: https://railway.app/docs
# =========================================================
# 仓库结构：
#   /Dockerfile              ← 根目录 Dockerfile（backend + worker 共用）
#   /backend/                ← Python 后端代码
#   /frontend/admin/Dockerfile  ← 前端 Dockerfile（nginx + Vue3）
#
# 部署方式：
#   1. backend service：Root Directory = /（默认），用根 Dockerfile
#   2. worker service：Root Directory = /，用根 Dockerfile，启动命令覆盖
#   3. frontend service：Root Directory = frontend/admin，用子目录 Dockerfile
# =========================================================

[environments.production]

# ---------- 后端 API 服务 ----------
# Railway 控制台配置：
#   Service Name: backend
#   Root Directory: / (默认，不需要改)
#   Start Command: (留空，用 Dockerfile CMD)

[config.backend.healthcheck]
path = "/health"
timeout = 60

# ---------- Celery Worker 服务 ----------
# Railway 控制台配置：
#   Service Name: worker
#   Root Directory: / (默认，不需要改)
#   Start Command: celery -A app.core.celery_app worker -l info -Q default,parsing,llm --concurrency=2

# ---------- 前端管理后台服务 ----------
# Railway 控制台配置：
#   Service Name: frontend
#   Root Directory: frontend/admin
#   Start Command: (留空，用 Dockerfile CMD)
#   Variables: BACKEND_HOST=${{backend.RAILWAY_PUBLIC_DOMAIN}}:80

[config.frontend.healthcheck]
path = "/"
timeout = 30
