# =========================================================
# Loki 配置 — 日志聚合后端
# 端口：3100（API/推送）
# 存储：本地文件系统（filesystem），保留 30 天
# 部署：单节点模式（monolithic），适合中小规模
# =========================================================
auth_enabled: false  # 多租户关闭（单租户模式）

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

# ---------- 常用入口 ----------
common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# ---------- 查询 ----------
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

# ---------- 存储（本地文件系统） ----------
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
  filesystem:
    directory: /loki/storage

# ---------- 数据保留（30 天） ----------
limits_config:
  retention_period: 720h  # 30 天 = 30 * 24h
  max_query_series: 5000
  max_query_parallelism: 16
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # 超过 7 天的旧样本拒绝（防止误推）
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20

# ---------- 压缩与保留（compactor 自动清理过期数据） ----------
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem

# ---------- schema（TSDB 周期） ----------
schema_config:
  configs:
    - from: 2026-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ---------- ruler（告警规则，可选） ----------
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: ""  # 如启用 alertmanager 填写
  enable_api: true
  enable_alertmanager_v2: true
