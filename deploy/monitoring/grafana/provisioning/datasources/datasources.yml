# =========================================================
# Grafana 数据源自动配置 — Phase 4 T2 监控栈
# （此文件独立于 deploy/docker/grafana 下的观测性栈数据源配置，
#   供 docker-compose.monitoring.yml 使用）
# =========================================================
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
