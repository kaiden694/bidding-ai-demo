{{/* =========================================================
前端 Service (ClusterIP)
对外暴露 Nginx 80 端口，集群内通过 frontend-svc 访问
========================================================= */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sbaw.fullname" . }}-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sbaw.componentLabels" (dict "ctx" . "component" "frontend") | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "sbaw.componentSelectorLabels" (dict "ctx" . "component" "frontend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
