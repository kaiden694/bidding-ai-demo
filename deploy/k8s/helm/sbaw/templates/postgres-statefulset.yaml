{{/* =========================================================
PostgreSQL StatefulSet (pgvector/pgvector:pg16)
- StatefulSet 提供稳定标识 + PVC 持久化
- Headless Service: 稳定 Pod DNS（StatefulSet 必需）
- ClusterIP Service: 应用访问入口 (postgres-svc:5432)
- ConfigMap (init-sql): 启用 vector / pg_trgm / uuid-ossp 扩展
- PVC: 10Gi (默认)
========================================================= */}}

# ---- init SQL ConfigMap：启用 pgvector 等扩展 ----
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sbaw.fullname" . }}-postgres-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sbaw.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
data:
  init.sql: |
    -- 启用 pgvector 扩展（向量检索）
    CREATE EXTENSION IF NOT EXISTS vector;

    -- 启用模糊匹配扩展（关键词混合检索）
    CREATE EXTENSION IF NOT EXISTS pg_trgm;

    -- 启用 UUID 生成
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- 注: 业务表通过 Alembic 迁移管理，这里仅启用扩展
---
# ---- Headless Service: 为 StatefulSet 提供稳定 Pod DNS ----
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sbaw.fullname" . }}-postgres-headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sbaw.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    {{- include "sbaw.componentSelectorLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
  ports:
    - name: tcp-pg
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# ---- ClusterIP Service: 应用访问入口 ----
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sbaw.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sbaw.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "sbaw.componentSelectorLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
  ports:
    - name: tcp-pg
      port: 5432
      targetPort: 5432
      protocol: TCP
---
# ---- StatefulSet ----
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "sbaw.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sbaw.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: {{ include "sbaw.fullname" . }}-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      {{- include "sbaw.componentSelectorLabels" (dict "ctx" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sbaw.componentSelectorLabels" (dict "ctx" . "component" "postgres") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "sbaw.podSecurityContext" . | nindent 6 }}
      # 禁止同时运行两个实例避免数据损坏
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: {{ include "sbaw.image" .Values.images.postgres }}
          imagePullPolicy: {{ .Values.images.postgres.pullPolicy }}
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sbaw.fullname" . }}-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "sbaw.fullname" . }}-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "sbaw.fullname" . }}-secret
                  key: POSTGRES_PASSWORD
            - name: TZ
              value: {{ .Values.env.TZ | quote }}
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: tcp-pg
              containerPort: 5432
              protocol: TCP
          # 存活探针：pg_isready 检查
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          # 就绪探针
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          volumeMounts:
            # 数据持久化
            - name: data
              mountPath: /var/lib/postgresql/data
            # init 脚本：首次启动时自动执行（创建扩展）
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          {{- include "sbaw.securityContext" . | nindent 10 }}
      volumes:
        - name: init-sql
          configMap:
            name: {{ include "sbaw.fullname" . }}-postgres-init
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  # PVC 模板：持久化存储（默认 10Gi）
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "sbaw.componentLabels" (dict "ctx" . "component" "postgres") | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.postgres.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
