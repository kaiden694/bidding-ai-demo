{{/* =========================================================
Secret：敏感配置（数据库密码 / JWT 密钥 / LLM API Key / MinIO 密钥等）
所有字段通过 b64enc 编码，从 values 读取
注意：生产环境应通过 --set 或外部 sealed-secret 注入，不要提交明文
========================================================= */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sbaw.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sbaw.labels" . | nindent 4 }}
type: Opaque
data:
  # ---- JWT 会话密钥 ----
  SECRET_KEY: {{ .Values.secrets.secretKey | b64enc | quote }}
  JWT_ALGORITHM: {{ .Values.secrets.jwtAlgorithm | b64enc | quote }}
  JWT_ACCESS_EXPIRE_MINUTES: {{ .Values.secrets.jwtAccessExpireMinutes | b64enc | quote }}
  JWT_REFRESH_EXPIRE_DAYS: {{ .Values.secrets.jwtRefreshExpireDays | b64enc | quote }}

  # ---- PostgreSQL 密码 ----
  POSTGRES_PASSWORD: {{ .Values.postgres.password | b64enc | quote }}

  # ---- Redis 密码（如启用）----
  {{- if .Values.redis.password }}
  REDIS_PASSWORD: {{ .Values.redis.password | b64enc | quote }}
  {{- end }}

  # ---- MinIO 密钥 ----
  MINIO_SECRET_KEY: {{ .Values.minio.secretKey | b64enc | quote }}

  # ---- LLM API Key ----
  LLM_API_KEY: {{ .Values.llm.apiKey | b64enc | quote }}

  # ---- Embedding API Key（如与 LLM 不同）----
  EMBEDDING_API_KEY: {{ .Values.embedding.apiKey | b64enc | quote }}
