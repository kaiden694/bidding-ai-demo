{{/* =========================================================
后端 Service (ClusterIP)
对外暴露 FastAPI 8000 端口，集群内通过 backend-svc 访问
========================================================= */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "sbaw.fullname" . }}-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sbaw.componentLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "sbaw.componentSelectorLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
