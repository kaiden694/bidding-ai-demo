{{/* =========================================================
Celery Beat Deployment
- 定时任务调度器（资质预警每日 09:00 扫描）
- 副本数固定为 1（避免多实例重复调度）
- envFrom: configmap + secret
========================================================= */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sbaw.fullname" . }}-celery-beat
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sbaw.componentLabels" (dict "ctx" . "component" "celery-beat") | nindent 4 }}
spec:
  # Beat 必须单实例运行，避免重复触发定时任务
  replicas: 1
  selector:
    matchLabels:
      {{- include "sbaw.componentSelectorLabels" (dict "ctx" . "component" "celery-beat") | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "sbaw.componentSelectorLabels" (dict "ctx" . "component" "celery-beat") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- include "sbaw.podSecurityContext" . | nindent 6 }}
      # 优雅终止
      terminationGracePeriodSeconds: 60
      containers:
        - name: celery-beat
          image: {{ include "sbaw.image" .Values.images.backend }}
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          # 启动命令：beat 调度器
          command: ["/bin/sh", "-c"]
          args:
            - {{ .Values.celeryBeat.command | quote }}
          # 从 ConfigMap + Secret 注入环境变量
          envFrom:
            - configMapRef:
                name: {{ include "sbaw.fullname" . }}-config
            - secretRef:
                name: {{ include "sbaw.fullname" . }}-secret
          resources:
            {{- toYaml .Values.celeryBeat.resources | nindent 12 }}
          {{- include "sbaw.securityContext" . | nindent 10 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
