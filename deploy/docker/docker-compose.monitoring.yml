# =========================================================
# 监控告警栈 — Phase 4 T2
#
# 组件：
#   - Prometheus   (9090)  指标采集 + 告警评估
#   - AlertManager  (9093)  告警路由 + 通知
#   - Grafana      (3001)  可视化大盘（预配置数据源 + 自动加载大盘）
#   - Node Exporter (9100)  主机指标（CPU/内存/磁盘/网络）
#
# 用法：
#   docker compose -f deploy/docker/docker-compose.monitoring.yml up -d
#
# 注意：
#   - 此栈与 docker-compose.observability.yml 中的 Prometheus/Grafana 端口冲突
#     （均为 9090/3001），请勿同时启动两个栈；如需统一观测，请二选一
#   - prometheus.yml 中 backend 目标使用 `backend:8000`，要求后端容器名为 `backend`
#     且与监控栈在同一 docker network；本地开发可用 host.docker.internal 替换
# =========================================================
version: "3.9"

services:
  # ---------------- Prometheus（指标采集 + 告警评估） ----------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sbaw-prometheus-mon
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      # 主配置 + 告警规则
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alerts.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus_mon_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    depends_on:
      - alertmanager

  # ---------------- AlertManager（告警路由 + 通知） ----------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: sbaw-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ../monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  # ---------------- Grafana（可视化大盘） ----------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: sbaw-grafana-mon
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3001:3000"  # 宿主机 3001 → 容器 3000，避免与前端冲突
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_mon_data:/var/lib/grafana
      # 数据源 + 大盘自动加载配置
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      # 大盘 JSON 文件挂载到 dashboard provider 配置的路径
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

  # ---------------- Node Exporter（主机指标采集） ----------------
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: sbaw-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

volumes:
  prometheus_mon_data:
  alertmanager_data:
  grafana_mon_data:
