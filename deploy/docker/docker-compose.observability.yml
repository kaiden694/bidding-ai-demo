# =========================================================
# 可观测性栈 — 日志聚合 + 链路追踪 + 可视化
# 组件：
#   - Loki       (3100)  日志聚合
#   - Tempo      (4317 OTLP gRPC / 3200 UI)  链路追踪
#   - Prometheus (9090)  指标采集（T2 配置，此处预留）
#   - Grafana    (3001)  可视化（预配置 Loki + Tempo 数据源）
#
# 用法：
#   docker compose -f deploy/docker/docker-compose.observability.yml up -d
#   注：需与项目根 docker-compose.yml 在同一 network，或手动指定 external network
# =========================================================
version: "3.9"

services:
  # ---------------- Loki（日志聚合） ----------------
  loki:
    image: grafana/loki:3.0.0
    container_name: sbaw-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ../monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------- Promtail（日志采集 agent） ----------------
  promtail:
    image: grafana/promtail:3.0.0
    container_name: sbaw-promtail
    restart: unless-stopped
    depends_on:
      - loki
    volumes:
      - ../monitoring/promtail-config.yml:/etc/promtail/promtail-config.yaml:ro
      - promtail_data:/tmp
      # 采集宿主机应用日志（需宿主机 logs 目录映射到容器）
      - ../../backend/logs:/var/log/sbaw:ro
      # 采集 docker 容器日志
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yaml

  # ---------------- Tempo（链路追踪后端，接收 OTLP） ----------------
  tempo:
    image: grafana/tempo:1.5.0
    container_name: sbaw-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo UI
      - "4317:4317"    # OTLP gRPC（应用推送 traces）
      - "4318:4318"    # OTLP HTTP
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------- Prometheus（指标采集，T2 配置，此处预留） ----------------
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sbaw-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ---------------- Grafana（可视化，预配置数据源） ----------------
  grafana:
    image: grafana/grafana:10.4.0
    container_name: sbaw-grafana
    restart: unless-stopped
    depends_on:
      - loki
      - tempo
      - prometheus
    ports:
      - "3001:3000"  # 宿主机 3001 → 容器 3000，避免与前端冲突
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      # 预配置数据源（Loki + Tempo + Prometheus）
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  loki_data:
  promtail_data:
  tempo_data:
  prometheus_data:
  grafana_data:
