# =========================================================
# Grafana 数据源自动配置 — Loki + Tempo + Prometheus
# 启动时自动注入，无需手动在 UI 添加
# =========================================================
apiVersion: 1

datasources:
  # ---------------- Loki（日志查询） ----------------
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000
      # Tempo 链路跳转：从日志 trace_id 跳转到 Tempo
      derivedFields:
        - datasourceUid: tempo
          name: TraceID
          matcherRegex: '"trace_id":"([0-9a-f]+)"'
          url: "$${__value.raw}"

  # ---------------- Tempo（链路查询） ----------------
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # 从 trace 跳转回 Loki 日志
      tracesToLogs:
        datasourceUid: loki
        tags: ["request_id", "trace_id", "span_id"]
        mappedTags:
          - key: "service.name"
            value: "module"
      search:
        hide: false

  # ---------------- Prometheus（指标查询） ----------------
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
